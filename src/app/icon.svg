<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12121A"/>
      <stop offset="100%" stop-color="#1C1C28"/>
    </linearGradient>
    <linearGradient id="flaskGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="100%" stop-color="#4FACFE"/>
    </linearGradient>
    <linearGradient id="ballGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF0844"/>
      <stop offset="100%" stop-color="#FFB199"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="400" height="400" rx="48" fill="url(#bgGradient)"/>

  <path d="M 170 80 L 230 80 L 230 130 L 310 270 A 20 20 0 0 1 290 310 L 110 310 A 20 20 0 0 1 90 270 L 170 130 Z" 
        fill="none" stroke="url(#flaskGradient)" stroke-width="10" stroke-linejoin="round" filter="url(#glow)"/>
  
  <line x1="160" y1="80" x2="240" y2="80" stroke="url(#flaskGradient)" stroke-width="10" stroke-linecap="round"/>

  <circle cx="200" cy="170" r="5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="165" cy="210" r="5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="235" cy="210" r="5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="130" cy="250" r="5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="200" cy="250" r="5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="270" cy="250" r="5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="165" cy="290" r="5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="235" cy="290" r="5" fill="#FFFFFF" opacity="0.8"/>

  <circle cx="200" cy="110" r="12" fill="url(#ballGradient)" filter="url(#glow)">
    <animate attributeName="cy" values="100; 150; 190; 230; 280" keyTimes="0; 0.25; 0.5; 0.75; 1" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 1 1; 0.4 0 1 1; 0.4 0 1 1; 0.4 0 1 1"/>
    <animate attributeName="cx" values="200; 180; 215; 180; 200" keyTimes="0; 0.25; 0.5; 0.75; 1" dur="1.5s" repeatCount="indefinite" calcMode="linear"/>
  </circle>

  <text x="200" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">PLINKO LABS</text>
</svg>
